
{% load static %}
{% load humanize %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estado de Cuenta</title>
    <!-- Bootstrap base styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Font Rubik -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik&display=swap" rel="stylesheet">
    <!-- Customised CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container mt-4">
  <h2>Eliminar Factura {{ factura.folio }}</h2>
  <form method="post">
    {% csrf_token %}
    <p>¿Estás seguro de que deseas eliminar esta factura?</p>
    <label>Motivo de eliminación:</label>
    <input type="text" name="motivo" required class="form-control">
    <br>
    <button type="submit" class="btn btn-danger">Eliminar</button>
    {% comment %} <a href="{% url 'lista_facturas' %}" class="btn btn-secondary">Cancelar</a> {% endcomment %}
    <a href="{% if request.GET.next %}{{ request.GET.next }}{% else %}{% url 'lista_facturas' %}{% endif %}" class="btn btn-secondary">Cancelar</a>
  </form>
</div>  
<!-- 🔹 Footer -->
    <footer>
        © {% now "Y" %} GESAC. Created By JMEB Todos los derechos reservados. <br>
    </footer>

    <!-- Scripts -->
    <script src="{% static 'js/script.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
