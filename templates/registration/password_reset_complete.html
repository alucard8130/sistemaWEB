{% load static %}
{% load tz %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña restablecida — GESAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body { min-height: 100vh; background: #f0f4f8; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div class="navbar navbar-expand-lg sticky-top py-2 shadow-navbar">
        <div class="d-flex align-items-center ms-auto">
            <button id="toggleDark" class="toggle-switch">
                <div class="toggle-ball"><i class="bi bi-moon-fill"></i></div>
            </button>
        </div>
    </div>

    <div class="flex-grow-1 d-flex justify-content-center align-items-center px-3 py-5">
        <div class="w-100" style="max-width: 420px;">
            <div class="text-center mb-4">
                <img src="{% static 'img/iconoGESAC.png' %}" alt="Logo" style="width:70px;" class="mb-3">
                <h4 class="fw-bold">Contraseña restablecida</h4>
            </div>
            <div class="card shadow-sm p-4 text-center">
                <i class="bi bi-check-circle-fill text-success mb-3" style="font-size:3rem;"></i>
                <div class="alert alert-success py-2">
                    Tu contraseña ha sido cambiada exitosamente.
                </div>
                <p class="text-muted small mb-4">Ya puedes iniciar sesión con tu nueva contraseña.</p>
                <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar sesión
                </a>
            </div>
        </div>
    </div>

    <footer class="text-center text-muted small py-3">
        © {% now "Y" %} GESAC. Created By JMEB. Todos los derechos reservados.
    </footer>

    <script src="{% static 'js/script.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
