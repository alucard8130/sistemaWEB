{% load static %}
{% load tz %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña — GESAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body { min-height: 100vh; background: #f0f4f8; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div class="navbar navbar-expand-lg sticky-top py-2 shadow-navbar">
        <div class="d-flex align-items-center ms-auto">
            <button id="toggleDark" class="toggle-switch">
                <div class="toggle-ball"><i class="bi bi-moon-fill"></i></div>
            </button>
        </div>
    </div>

    <div class="flex-grow-1 d-flex justify-content-center align-items-center px-3 py-5">
        <div class="w-100" style="max-width: 420px;">
            <div class="text-center mb-4">
                <img src="{% static 'img/iconoGESAC.png' %}" alt="Logo" style="width:70px;" class="mb-3">
                <h4 class="fw-bold">Recuperar contraseña</h4>
                <p class="text-muted small">Ingresa tu correo y te enviaremos instrucciones para restablecer tu contraseña.</p>
            </div>
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label">Correo electrónico</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                                <input type="email" name="email" autofocus required
                                       class="form-control" id="id_email"
                                       inputmode="email" autocomplete="email">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="bi bi-send me-2"></i>Enviar instrucciones
                        </button>
                    </form>
                    <hr>
                    <div class="text-center">
                        <a href="{% url 'login' %}" class="small text-muted">
                            <i class="bi bi-arrow-left me-1"></i> Volver al inicio de sesión
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center text-muted small py-3">
        © {% now "Y" %} GESAC. Created By JMEB. Todos los derechos reservados.
    </footer>

    <script src="{% static 'js/script.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
