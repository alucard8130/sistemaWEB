<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email enviado — GESAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
    </style>
</head>
<body>
<div class="container py-4" style="max-width: 420px;">
    <div class="card shadow-sm text-center p-4">
        <i class="bi bi-envelope-check text-success" style="font-size: 3rem;"></i>
        <h5 class="mt-3 fw-bold">Revisa tu correo</h5>
        <p class="text-muted small">
            Si existe una cuenta con ese correo, recibirás un enlace para restablecer tu contraseña en los próximos minutos.
        </p>
        <a href="{% url 'acceso_login' %}" class="btn btn-outline-primary w-100">
            <i class="bi bi-arrow-left me-1"></i> Volver al login
        </a>
    </div>
</div>
</body>
</html>
