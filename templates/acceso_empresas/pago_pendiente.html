<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago pendiente — GESAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .portal-header { background: #152A52; color: white; padding: 14px 20px; text-align: center; }
    </style>
</head>
<body>

<div class="portal-header">
    <div class="fw-bold">GESAC — Portal de Acceso</div>
</div>

<div class="container py-4" style="max-width: 480px;">
    <div class="card shadow-sm text-center p-4">
        <i class="bi bi-clock-history text-warning" style="font-size: 3rem;"></i>
        <h5 class="mt-3 fw-bold">Activa tu suscripción</h5>
        <p class="text-muted small">
            Tu cuenta fue creada correctamente. Para acceder al portal necesitas activar tu suscripción mensual.
        </p>
        <a href="{% url 'acceso_checkout' %}" class="btn btn-primary btn-lg w-100 mb-3">
            <i class="bi bi-credit-card me-1"></i> Activar suscripción
        </a>
        <a href="{% url 'acceso_login' %}" class="btn btn-outline-secondary w-100">
            <i class="bi bi-arrow-left me-1"></i> Volver al login
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
