<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pago pendiente — GESAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>body { background: #f0f4f8; }</style>
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm text-center p-4">
        <i class="bi bi-clock-history text-warning" style="font-size: 3rem;"></i>
        <h4 class="mt-3">Cuenta creada — Activa tu suscripción</h4>
        <p class="text-muted">
            Para acceder al portal necesitas activar tu suscripción mensual.
        </p>
        {% if request.user.is_authenticated and request.user.usuario_acceso %}
        <div class="alert alert-info text-start mb-3">
            <strong>Tu plan:</strong> {{ request.user.usuario_acceso.get_plan_display }}<br>
        </div>
        <a href="{% url 'acceso_checkout' %}" class="btn btn-primary btn-lg w-100 mb-2">
            <i class="bi bi-credit-card me-1"></i> Activar suscripción
        </a>
        {% endif %}
        <a href="{% url 'acceso_login' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i> Volver al login
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
