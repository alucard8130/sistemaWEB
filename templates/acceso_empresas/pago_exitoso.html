<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago exitoso — GESAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .portal-header { background: #152A52; color: white; padding: 14px 20px; text-align: center; }
    </style>
</head>
<body>

<div class="portal-header">
    <div class="fw-bold">GESAC — Portal de Acceso</div>
</div>

<div class="container py-4" style="max-width: 480px;">
    <div class="card shadow-sm text-center p-4">
        <i class="bi bi-check-circle-fill text-success" style="font-size: 3.5rem;"></i>
        <h4 class="mt-3 fw-bold">¡Pago exitoso!</h4>
        <p class="text-muted">Tu suscripción ha sido activada. Ya puedes acceder al portal y solicitar acceso a tus condominios.</p>
        <a href="{% url 'acceso_dashboard' %}" class="btn btn-primary btn-lg w-100">
            <i class="bi bi-house me-1"></i> Ir al portal
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
