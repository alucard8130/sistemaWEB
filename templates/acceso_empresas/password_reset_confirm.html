<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña — GESAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .login-card { width: 100%; max-width: 420px; margin: 0 auto; padding: 16px; }
        .brand-header { background: #152A52; color: white; padding: 24px 32px; border-radius: 12px 12px 0 0; text-align: center; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand-header">
        <h3 class="mb-1 fw-bold">GESAC</h3>
        <div class="small opacity-75">Crear nueva contraseña</div>
    </div>
    <div class="card border-0 shadow-sm" style="border-radius: 0 0 12px 12px;">
        <div class="card-body p-4">
            {% if validlink %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} small py-2">{{ message }}</div>
                    {% endfor %}
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Nueva contraseña</label>
                        <input type="password" name="new_password1" class="form-control"
                               required minlength="8" autocomplete="new-password">
                        <div class="form-text">Mínimo 8 caracteres.</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirmar contraseña</label>
                        <input type="password" name="new_password2" class="form-control"
                               required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-lock me-1"></i> Guardar nueva contraseña
                    </button>
                </form>
            {% else %}
                <div class="alert alert-danger">
                    El enlace no es válido o ya expiró. Solicita uno nuevo.
                </div>
                <a href="{% url 'acceso_password_reset' %}" class="btn btn-primary w-100">
                    <i class="bi bi-envelope me-1"></i> Solicitar nuevo enlace
                </a>
            {% endif %}
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
