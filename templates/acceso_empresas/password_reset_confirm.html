<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva contraseña — GESAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: #f0f4f8; }</style>
</head>
<body>
<div style="max-width:420px; margin:80px auto;">
    <div style="background:#152A52; color:white; padding:28px 32px; border-radius:12px 12px 0 0; text-align:center;">
        <h3 class="mb-1 fw-bold">GESAC</h3>
        <div class="small opacity-75">Crear nueva contraseña</div>
    </div>
    <div class="card border-0 shadow-sm" style="border-radius:0 0 12px 12px;">
        <div class="card-body p-4">
            {% if validlink %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Nueva contraseña</label>
                        <input type="password" name="new_password1" class="form-control" required minlength="8">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirmar contraseña</label>
                        <input type="password" name="new_password2" class="form-control" required>
                    </div>
                    {% if form.errors %}
                        <div class="alert alert-danger small">
                            {% for error in form.non_field_errors %}{{ error }}{% endfor %}
                        </div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-lock me-1"></i> Guardar nueva contraseña
                    </button>
                </form>
            {% else %}
                <div class="alert alert-danger">
                    El enlace no es válido o ya expiró. Solicita uno nuevo.
                </div>
                <a href="{% url 'acceso_password_reset' %}" class="btn btn-primary w-100">
                    Solicitar nuevo enlace
                </a>
            {% endif %}
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
