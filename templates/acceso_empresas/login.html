{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal de Acceso — GESAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .login-card { max-width: 420px; margin: 80px auto; }
        .brand-header { background: #152A52; color: white; padding: 28px 32px; border-radius: 12px 12px 0 0; text-align: center; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand-header">
        <h3 class="mb-1 fw-bold">GESAC</h3>
        <div class="small opacity-75">Portal para Administradoras y Comités</div>
    </div>
    <div class="card border-0 shadow-sm" style="border-radius: 0 0 12px 12px;">
        <div class="card-body p-4">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} py-2">{{ message }}</div>
                {% endfor %}
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Usuario o correo electrónico</label>
                    <input type="text" name="username" class="form-control" placeholder="usuario@empresa.com/usuario" autofocus required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar sesión
                </button>
                <div class="text-center mt-2">
                    <a href="{% url 'acceso_password_reset' %}" class="small text-muted">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>
            </form>
            <hr>
            <div class="text-center">
                <span class="text-muted small">¿Aún no tienes cuenta?</span>
                <a href="{% url 'acceso_registro' %}" class="small ms-1">Regístrate aquí</a>
            </div>
              <div class="mt-3 text-center">
                <a href="{% url 'login' %}" class="text-decoration-none">
                    <i class="bi bi-box-arrow-in-left me-1"></i>Regresar
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
