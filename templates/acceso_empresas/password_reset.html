<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña — GESAC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: #f0f4f8; }</style>
</head>
<body>
<div style="max-width:420px; margin:80px auto;">
    <div style="background:#152A52; color:white; padding:28px 32px; border-radius:12px 12px 0 0; text-align:center;">
        <h3 class="mb-1 fw-bold">GESAC</h3>
        <div class="small opacity-75">Recuperar contraseña</div>
    </div>
    <div class="card border-0 shadow-sm" style="border-radius:0 0 12px 12px;">
        <div class="card-body p-4">
            <p class="text-muted small mb-3">
                Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" name="email" class="form-control" required autofocus>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-envelope me-1"></i> Enviar enlace
                </button>
            </form>
            <hr>
            <div class="text-center">
                <a href="{% url 'acceso_login' %}" class="small">
                    <i class="bi bi-arrow-left me-1"></i> Volver al login
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
