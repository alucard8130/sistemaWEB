<!-- Asistente Chat Widget -->
<div id="chat-widget-container" style="position: fixed; bottom: 20px; left: 20px; z-index: 9999;">
    <style>
        .chat-widget-toggle {
            width: 62px;
            height: 62px;
            background: linear-gradient(135deg, #6a5cf5 0%, #8b5cf6 45%, #a855f7 100%);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex !important;
            align-items: center;
            justify-content: center;
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9999;
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.45), 0 2px 6px rgba(0, 0, 0, 0.15);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            overflow: visible;
        }

        .chat-widget-toggle:hover {
            transform: scale(1.08) rotate(-3deg);
            box-shadow: 0 10px 28px rgba(118, 75, 162, 0.55), 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* Halo de pulso detrás del botón */
        .chat-toggle-glow {
            position: absolute;
            inset: -7px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.55) 0%, rgba(139, 92, 246, 0) 70%);
            animation: chatTogglePulse 2.6s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes chatTogglePulse {
            0%, 100% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.3); opacity: 0.2; }
        }

        .chat-toggle-icon {
            width: 30px;
            height: 30px;
            position: absolute;
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
        }

        /* Icono de bot (estado cerrado) */
        .chat-toggle-icon-bot {
            animation: chatBotBob 3s ease-in-out infinite;
        }

        @keyframes chatBotBob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }

        .chat-toggle-eye {
            transform-box: fill-box;
            transform-origin: center;
            animation: chatBotBlink 4s ease-in-out infinite;
        }

        @keyframes chatBotBlink {
            0%, 92%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.15); }
        }

        .chat-toggle-antenna-dot {
            transform-box: fill-box;
            transform-origin: center;
            animation: chatAntennaGlow 1.8s ease-in-out infinite;
        }

        @keyframes chatAntennaGlow {
            0%, 100% { opacity: 0.6; transform: scale(0.85); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* Icono de cerrar (X), oculto por defecto */
        .chat-toggle-icon-close {
            opacity: 0;
            transform: scale(0.6) rotate(-45deg);
        }

        .chat-widget-toggle.open .chat-toggle-icon-bot {
            opacity: 0;
            transform: scale(0.6) rotate(45deg);
        }

        .chat-widget-toggle.open .chat-toggle-icon-close {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        /* Destello premium en la esquina, solo visible cuando esta cerrado */
        .chat-toggle-sparkle {
            position: absolute;
            top: -2px;
            right: -2px;
            font-size: 14px;
            color: #fde68a;
            text-shadow: 0 0 6px rgba(253, 230, 138, 0.9);
            animation: chatSparkleTwinkle 2.2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes chatSparkleTwinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.15) rotate(15deg); }
        }

        .chat-widget-toggle.open .chat-toggle-sparkle {
            display: none;
        }

        .chat-widget-frame {
            position: fixed;
            bottom: 100px;
            left: 20px;
            width: 400px;
            height: 600px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 9998;
            border: none;
            background: white;
        }

        .chat-widget-frame.open {
            display: block !important;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>

    <button class="chat-widget-toggle" id="chatToggle" aria-label="Abrir Sherlock">
        <span class="chat-toggle-glow"></span>

        <svg class="chat-toggle-icon chat-toggle-icon-bot" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="24" y1="6" x2="24" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <circle class="chat-toggle-antenna-dot" cx="24" cy="5" r="2.6" fill="white"/>
            <rect x="10" y="12" width="28" height="24" rx="10" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2.2"/>
            <circle class="chat-toggle-eye" cx="19" cy="24" r="3.2" fill="white"/>
            <circle class="chat-toggle-eye" cx="29" cy="24" r="3.2" fill="white"/>
            <path d="M18 30c1.8 2 4.2 3 6 3s4.2-1 6-3" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>

        <svg class="chat-toggle-icon chat-toggle-icon-close" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 6l12 12M18 6L6 18" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
        </svg>

        <span class="chat-toggle-sparkle">✦</span>
    </button>

    <iframe
        id="chatFrame"
        class="chat-widget-frame"
        src="/asistente/"
    ></iframe>
</div>

<script>
    document.getElementById('chatToggle').addEventListener('click', function () {
        const frame = document.getElementById('chatFrame');
        const isOpen = frame.classList.toggle('open');
        this.classList.toggle('open', isOpen);
        this.setAttribute('aria-label', isOpen ? 'Cerrar Sherlock' : 'Abrir Sherlock');
    });
</script>
